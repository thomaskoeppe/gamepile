apiVersion: v1
kind: Secret
metadata:
  name: gamepile-secrets
  namespace: gamepile
type: Opaque
stringData:
  POSTGRES_PASSWORD: "your-db-password"
  DATABASE_URL: "postgresql://gamepile:your-db-password@postgres-service:5432/gamepile?schema=public"
  REDIS_PASSWORD: "your-redis-password"
  STEAM_API_KEY: "your-steam-api-key"
  WEB_VAULT_TOKEN_SECRET: "your-vault-token-secret"
