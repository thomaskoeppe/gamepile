apiVersion: v1
kind: ConfigMap
metadata:
  name: gamepile-config
  namespace: gamepile
data:
  NODE_ENV: production
  WEB_APP_URL: "https://gamepile.example.com"
  REDIS_HOST: redis-service
  REDIS_PORT: "6379"
  POSTGRES_HOST: postgres-service
  POSTGRES_PORT: "5432"
  POSTGRES_DB: gamepile
  POSTGRES_USER: gamepile
  OTEL_EXPORTER_OTLP_ENDPOINT: ""
  OTEL_EXPORTER_OTLP_HEADERS: ""
  OTEL_LOG_LEVEL: info
  WORKER_JOBS_CONCURRENCY: "3"
  WORKER_DETAILS_CONCURRENCY: "10"
  WORKER_STALE_ACTIVE_RECOVERY_DELAY_MS: "1800000"
  WORKER_ACTIVE_RECOVERY_LOCK_TTL_MS: "60000"
  WORKER_STEAM_RATE_LIMIT_MAX: "200"
  WORKER_STEAM_RATE_LIMIT_WINDOW_MS: "300000"
  WORKER_STEAM_RATE_LIMIT_MIN_INTERVAL_MS: "1500"
  WORKER_STEAM_RATE_LIMIT_SCOPE: distributed
  WORKER_SYNC_STEAM_GAMES_CRON: "0 3 * * 0"
  WORKER_REFRESH_GAME_DETAILS_CRON: "0 2 * * *"
  WORKER_GAME_DETAILS_REFRESH_DAYS: "30"
  LOG_LEVEL: info
  LOG_SERVICE: gamepile-web
  LOG_ENV: production
