# ─── Shared environment anchors ──────────────────────
x-common-env: &common-env
  NODE_ENV: production
  DOMAIN: "${DOMAIN:-gamepile.example.com}"
  ACME_EMAIL: "${ACME_EMAIL:-admin@example.com}"
  POSTGRES_USER: "${POSTGRES_USER:-gamepile}"
  POSTGRES_DB: "${POSTGRES_DB:-gamepile}"
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-gamepile_secret}"
  REDIS_PASSWORD: "${REDIS_PASSWORD:-redis_secret}"
  STEAM_API_KEY: "${STEAM_API_KEY}"
  WEB_VAULT_TOKEN_SECRET: "${WEB_VAULT_TOKEN_SECRET}"

services:
  # ────────────────────────────────────────────────────
  # PostgreSQL
  # ────────────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      <<: *common-env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - gamepile-net

  # ────────────────────────────────────────────────────
  # Redis (used by BullMQ for job queues)
  # ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: sh -c 'redis-server --requirepass "$REDIS_PASSWORD" --appendonly yes'
    environment:
      <<: *common-env
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - gamepile-net

  # ────────────────────────────────────────────────────
  # Prisma Migrations (run-once init container)
  # ────────────────────────────────────────────────────
  migrate:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
      target: builder
    command: npm run prisma:migrate:deploy --workspace=packages/web
    environment:
      <<: *common-env
      DATABASE_URL: "postgresql://${POSTGRES_USER:-gamepile}:${POSTGRES_PASSWORD:-gamepile_secret}@postgres:5432/${POSTGRES_DB:-gamepile}?schema=public"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - gamepile-net
    restart: "no"

  # ────────────────────────────────────────────────────
  # Web (Next.js frontend + API)
  # ────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      <<: *common-env
      DATABASE_URL: "postgresql://${POSTGRES_USER:-gamepile}:${POSTGRES_PASSWORD:-gamepile_secret}@postgres:5432/${POSTGRES_DB:-gamepile}?schema=public"
      WEB_APP_URL: "https://${DOMAIN:-gamepile.example.com}"
      WEB_ALLOWED_ORIGINS: "${WEB_ALLOWED_ORIGINS:-gamepile.example.com}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      LOG_SERVICE: "gamepile-web"
    depends_on:
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    expose:
      - "3000"
    networks:
      - gamepile-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.web.rule=Host(`${DOMAIN:-gamepile.example.com}`)"
      - "traefik.http.routers.web.entrypoints=websecure"
      - "traefik.http.routers.web.tls.certresolver=letsencrypt"
      - "traefik.http.services.web.loadbalancer.server.port=3000"

  # ────────────────────────────────────────────────────
  # Worker (BullMQ job processor — scale with replicas)
  # ────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: packages/worker/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      <<: *common-env
      DATABASE_URL: "postgresql://${POSTGRES_USER:-gamepile}:${POSTGRES_PASSWORD:-gamepile_secret}@postgres:5432/${POSTGRES_DB:-gamepile}?schema=public"
      WORKER_JOBS_CONCURRENCY: "3"
      WORKER_DETAILS_CONCURRENCY: "10"
      WORKER_STALE_ACTIVE_RECOVERY_DELAY_MS: "1800000"
      WORKER_ACTIVE_RECOVERY_LOCK_TTL_MS: "60000"
      WORKER_STEAM_RATE_LIMIT_MAX: "200"
      WORKER_STEAM_RATE_LIMIT_WINDOW_MS: "300000"
      WORKER_STEAM_RATE_LIMIT_MIN_INTERVAL_MS: "1500"
      WORKER_STEAM_RATE_LIMIT_SCOPE: "distributed"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      LOG_SERVICE: "gamepile-worker"
      LOG_ENV: "production"
    depends_on:
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - gamepile-net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s

  # ────────────────────────────────────────────────────
  # Traefik (Reverse Proxy + Auto TLS)
  # ────────────────────────────────────────────────────
  traefik:
    image: traefik:v3.3
    restart: unless-stopped
    command:
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:-admin@example.com}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt_data:/letsencrypt
    networks:
      - gamepile-net

volumes:
  postgres_data:
  redis_data:
  letsencrypt_data:

networks:
  gamepile-net:
    driver: bridge