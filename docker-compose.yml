# ─── Shared environment anchors ──────────────────────
x-common-env: &common-env
  NODE_ENV: production
  DOMAIN: "${DOMAIN:-gamepile.example.com}"
  ACME_EMAIL: "${ACME_EMAIL:-admin@example.com}"
  POSTGRES_USER: "${POSTGRES_USER:-gamepile}"
  POSTGRES_DB: "${POSTGRES_DB:-gamepile}"
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-gamepile_secret}"
  REDIS_PASSWORD: "${REDIS_PASSWORD:-redis_secret}"
  STEAM_API_KEY: "${STEAM_API_KEY}"
  WEB_VAULT_TOKEN_SECRET: "${WEB_VAULT_TOKEN_SECRET}"

services:
  # ────────────────────────────────────────────────────
  # PostgreSQL
  # ────────────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      <<: *common-env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - gamepile-net

  # ────────────────────────────────────────────────────
  # Redis (used by BullMQ for job queues)
  # ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: sh -c 'redis-server --requirepass "$REDIS_PASSWORD" --appendonly yes'
    environment:
      <<: *common-env
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - gamepile-net

  # ────────────────────────────────────────────────────
  # SQL Migrations (run-once init container)
  # ────────────────────────────────────────────────────
  migrate:
    image: ghcr.io/thomaskoeppe/gamepile/migrate:latest
    environment:
      <<: *common-env
      DATABASE_URL: "postgresql://${POSTGRES_USER:-gamepile}:${POSTGRES_PASSWORD:-gamepile_secret}@postgres:5432/${POSTGRES_DB:-gamepile}?schema=public"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - gamepile-net
    restart: "no"

  # ────────────────────────────────────────────────────
  # Web (Next.js frontend + API)
  # ────────────────────────────────────────────────────
  web:
    image: ghcr.io/thomaskoeppe/gamepile/web:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      <<: *common-env
      DATABASE_URL: "postgresql://${POSTGRES_USER:-gamepile}:${POSTGRES_PASSWORD:-gamepile_secret}@postgres:5432/${POSTGRES_DB:-gamepile}?schema=public"
      WEB_APP_URL: "http://${DOMAIN:-gamepile.example.com}"
      WEB_ALLOWED_ORIGINS: "${WEB_ALLOWED_ORIGINS:-gamepile.example.com}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      LOG_SERVICE: "gamepile-web"
    depends_on:
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    expose:
      - "3000"
    networks:
      - gamepile-net

  # ────────────────────────────────────────────────────
  # Worker (BullMQ job processor — scale with replicas)
  # ────────────────────────────────────────────────────
  worker:
    image: ghcr.io/thomaskoeppe/gamepile/worker:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      <<: *common-env
      DATABASE_URL: "postgresql://${POSTGRES_USER:-gamepile}:${POSTGRES_PASSWORD:-gamepile_secret}@postgres:5432/${POSTGRES_DB:-gamepile}?schema=public"
      WORKER_JOBS_CONCURRENCY: "3"
      WORKER_DETAILS_CONCURRENCY: "10"
      WORKER_STALE_ACTIVE_RECOVERY_DELAY_MS: "1800000"
      WORKER_ACTIVE_RECOVERY_LOCK_TTL_MS: "60000"
      WORKER_STEAM_RATE_LIMIT_MAX: "200"
      WORKER_STEAM_RATE_LIMIT_WINDOW_MS: "300000"
      WORKER_STEAM_RATE_LIMIT_MIN_INTERVAL_MS: "1500"
      WORKER_STEAM_RATE_LIMIT_SCOPE: "distributed"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      LOG_SERVICE: "gamepile-worker"
      LOG_ENV: "production"
    depends_on:
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - gamepile-net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s

  # ────────────────────────────────────────────────────
  # Caddy (Reverse Proxy — HTTP only)
  # ────────────────────────────────────────────────────
  caddy:
    image: caddy:alpine
    restart: unless-stopped
    ports:
      - "8080:8080"
    command: caddy reverse-proxy --from :8080 --to web:3000
    depends_on:
      - web
    networks:
      - gamepile-net

volumes:
  postgres_data:
  redis_data:

networks:
  gamepile-net:
    driver: bridge