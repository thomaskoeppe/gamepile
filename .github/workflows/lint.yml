name: Lint

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma clients
        run: |
          npm run prisma:generate --workspace=packages/web
          npm run prisma:generate --workspace=packages/worker
        env:
          DATABASE_URL: postgresql://dummy:5432/dummy

      - name: Lint web
        run: npm run lint --workspace=packages/web

